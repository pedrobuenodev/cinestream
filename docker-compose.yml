services:
  db:
    image: postgres:15
    container_name: cinestream_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinestream
      POSTGRES_PASSWORD: cinestream123
      POSTGRES_DB: cinestream_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinestream']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinestream_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinestream_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
